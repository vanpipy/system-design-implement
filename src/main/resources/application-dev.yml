spring:
  docker:
    compose:
      enabled: true
      lifecycle-management: start_only
  datasource:
    url: jdbc:h2:mem:shortlinkdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
