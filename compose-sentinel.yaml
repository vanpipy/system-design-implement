services:
  redis-master:
    image: bitnami/redis:7.2
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_REPLICATION_MODE=master
    ports:
      - "6379:6379"

  redis-replica-1:
    image: bitnami/redis:7.2
    depends_on:
      - redis-master
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_REPLICATION_MODE=slave
      - REDIS_MASTER_HOST=redis-master
      - REDIS_MASTER_PORT_NUMBER=6379

  redis-replica-2:
    image: bitnami/redis:7.2
    depends_on:
      - redis-master
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_REPLICATION_MODE=slave
      - REDIS_MASTER_HOST=redis-master
      - REDIS_MASTER_PORT_NUMBER=6379

  redis-sentinel-1:
    image: bitnami/redis-sentinel:7.2
    depends_on:
      - redis-master
      - redis-replica-1
      - redis-replica-2
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_MASTER_HOST=redis-master
      - REDIS_MASTER_PORT_NUMBER=6379
      - REDIS_MASTER_SET=mymaster
    ports:
      - "26379:26379"

  redis-sentinel-2:
    image: bitnami/redis-sentinel:7.2
    depends_on:
      - redis-master
      - redis-replica-1
      - redis-replica-2
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_MASTER_HOST=redis-master
      - REDIS_MASTER_PORT_NUMBER=6379
      - REDIS_MASTER_SET=mymaster
    ports:
      - "26380:26379"

  redis-sentinel-3:
    image: bitnami/redis-sentinel:7.2
    depends_on:
      - redis-master
      - redis-replica-1
      - redis-replica-2
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_MASTER_HOST=redis-master
      - REDIS_MASTER_PORT_NUMBER=6379
      - REDIS_MASTER_SET=mymaster
    ports:
      - "26381:26379"
